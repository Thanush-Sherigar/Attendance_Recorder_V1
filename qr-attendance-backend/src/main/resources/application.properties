spring.application.name=QR-Attendance-Backend

# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/qr_attendance?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# JWT Configuration (Secret should be stored securely in production, random 256-bit base64 key generated for dev)
app.jwt.secret=======================QR-Attendance-Pro-Secret-Key-Must-Be-At-Least-256-Bits======================
app.jwt.expirationMs=86400000

# Server port
server.port=8080
