spring.application.name=QR-Attendance-Backend

# Database Configuration
spring.datasource.url=jdbc:h2:mem:qr_attendance;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# JWT Configuration (Secret should be stored securely in production, random 256-bit base64 key generated for dev)
app.jwt.secret=======================QR-Attendance-Pro-Secret-Key-Must-Be-At-Least-256-Bits======================
app.jwt.expirationMs=86400000

# Server port
server.port=8080
